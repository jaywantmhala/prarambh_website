<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAFAFA; /* Soft light background for the page */
        }
        .success-card {
            /* Warm gradient matching the screenshot */
            background: linear-gradient(180deg, #FCF8F5 0%, #F5EAE0 100%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="success-card max-w-[400px] w-full rounded-[32px] p-8 text-center relative overflow-hidden border border-white">
        
        <!-- Glowing Checkmark Icon -->
        <div class="relative w-20 h-20 mx-auto mb-6 flex items-center justify-center">
            <!-- Glow effect -->
            <div class="absolute inset-0 bg-[#1E88E5] rounded-full blur-[20px] opacity-20"></div>
            <!-- Icon circle -->
            <div class="relative z-10 w-[52px] h-[52px] rounded-full border-[3px] border-[#1E88E5] flex items-center justify-center bg-transparent">
                <svg class="w-6 h-6 text-[#1E88E5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        
        <!-- Subtitle -->
        <h3 class="text-[#1E88E5] font-bold text-[11px] tracking-[0.25em] uppercase mb-3">Payment Confirmed</h3>
        
        <!-- Title -->
        <h1 class="text-[34px] leading-tight font-black mb-5 text-[#111827]">Thank You!</h1>
        
        <!-- Body Text -->
        <p class="text-[#4B5563] mb-8 text-[15px] leading-[1.6] px-1">
            We received your payment of <strong class="text-[#1E88E5]">₹99</strong>. Our team will contact you shortly with next steps.
        </p>
        
        <!-- Next Steps Box -->
        <div class="bg-[#EAE0D5]/40 border border-[#D5C3B3]/40 rounded-[20px] py-4 px-5 mb-8 flex items-center justify-center gap-3 text-left">
            <span class="text-[#1E88E5] font-bold text-[14px] shrink-0">Next:</span>
            <span class="text-[#4B5563] text-[13px] leading-snug font-medium">Check your WhatsApp/Email for confirmation.</span>
        </div>

        <!-- Button (Blue as requested) -->
        <a href="index.html" class="block w-full bg-[#1E88E5] hover:bg-[#1565C0] text-white font-bold text-[17px] py-[15px] rounded-full shadow-[0_8px_20px_rgba(30,136,229,0.25)] hover:shadow-[0_12px_25px_rgba(30,136,229,0.35)] transition-all duration-300 transform hover:-translate-y-0.5 mb-6">
            Back to Website
        </a>

        <!-- Footer Text -->
        <p class="text-[11px] text-[#6B7280] px-4 leading-[1.4]">
            If you were not redirected automatically, you can safely refresh this page.
        </p>
    </div>

</body>
</html>
